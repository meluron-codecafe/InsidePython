<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>InsidePython</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #2d3748;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 0.5rem;
      letter-spacing: -0.025em;
    }

    .subtitle {
      text-align: center;
      color: #718096;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    .notebooks {
      display: grid;
      gap: 1rem;
    }

    .notebook-item {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 2px 15px rgba(0,0,0,0.04);
    }

    .notebook-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      border-color: rgba(99, 102, 241, 0.2);
    }

    .notebook-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .notebook-number {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      min-width: 2rem;
      text-align: center;
    }

    .notebook-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a202c;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .notebook-title:hover {
      color: #6366f1;
    }

    .notebook-description {
      color: #4a5568;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-left: 2.75rem;
    }

    @media (max-width: 640px) {
      body {
        padding: 1.5rem 1rem;
      }
      
      h1 {
        font-size: 1.75rem;
      }
      
      .notebook-item {
        padding: 1rem 1.25rem;
      }
      
      .notebook-description {
        margin-left: 0;
        margin-top: 0.5rem;
      }
      
      .notebook-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>InsidePython</h1>
    <p class="subtitle">By meluron</p>
    <div class="notebooks" id="notebooks-container">
    </div>
  </div>

  <script>
    // Notebook data structure - easily add new notebooks here
    const notebooks = [
      {
        number: "00",
        title: "An Intro to Data, Data Types and Data Structure",
        description: "Understanding what they mean.",
        file: "htmls/00.html"
      },
      {
        number: "01", 
        title: "An Intro to Data Types",
        description: "Categorisation of datatypes.",
        file: "htmls/01.html"
      },
      {
        number: "02",
        title: "Getting to Know 'int' Better", 
        description: "Declaration, Memory Location, Memory Consumption, ...",
        file: "htmls/02.html"
      },
      {
        number: "03",
        title: "Getting To Know 'float' Better",
        description: "Declaration, Memory Location, Memory Consumption, ...",
        file: "htmls/03.html"
      }
    ];

    // Function to generate notebook HTML
    function generateNotebooks() {
      const container = document.getElementById('notebooks-container');
      
      notebooks.forEach(notebook => {
        const notebookItem = document.createElement('div');
        notebookItem.className = 'notebook-item';
        
        notebookItem.innerHTML = `
          <div class="notebook-header">
            <div class="notebook-number">${notebook.number}</div>
            <a href="${notebook.file}" class="notebook-title">${notebook.title}</a>
          </div>
          <p class="notebook-description">${notebook.description}</p>
        `;
        
        container.appendChild(notebookItem);
      });
    }

    // Generate notebooks when page loads
    document.addEventListener('DOMContentLoaded', generateNotebooks);
  </script>
</body>
</html>
